<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;

            margin-top: 100px;
            background-color: #f4f4f4;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 18px;
            color: #555;

    <h1>Welcome to My Website</h1>
    <p>This is a simple website built using only HTML and CSS.</p>
